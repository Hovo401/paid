---
- name: Check the installed nginx package version
  ansible.builtin.command: dpkg-query -W -f='${Version}' nginx
  register: nginx_pkg_version
  failed_when: false
  changed_when: false

- name: Purge distro nginx before switching to nginx.org
  ansible.builtin.apt:
    name: [nginx, nginx-common, nginx-core]
    state: absent
    purge: true
  when:
    - nginx_pkg_version.rc == 0
    - "'ubuntu' in nginx_pkg_version.stdout"

- name: Add nginx.org signing key
  ansible.builtin.get_url:
    url: https://nginx.org/keys/nginx_signing.key
    dest: /etc/apt/keyrings/nginx.asc
    mode: "0644"

- name: Add nginx.org apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nginx.asc] http://nginx.org/packages/{{ nginx_repo_branch }}ubuntu {{ ansible_distribution_release }} nginx"
    filename: nginx
    state: present

- name: Pin nginx packages to the nginx.org origin
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/99-nginx-org.pref
    mode: "0644"
    content: |
      Package: nginx*
      Pin: origin nginx.org
      Pin-Priority: 900

- name: Install nginx and certbot
  ansible.builtin.apt:
    name: [nginx, certbot]
    state: present
    update_cache: true

- name: Remove the shipped default vhost
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: reload nginx

- name: Ensure the ACME webroot exists
  ansible.builtin.file:
    path: "{{ certbot_webroot }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Detect an existing certificate
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  register: cert_stat

- name: Set TLS state
  ansible.builtin.set_fact:
    tls_enabled: "{{ cert_stat.stat.exists }}"

- name: Deploy vhost (phase 1)
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/conf.d/{{ domain }}.conf"
    mode: "0644"
  notify:
    - validate nginx
    - reload nginx

- name: Apply pending nginx changes
  ansible.builtin.meta: flush_handlers

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command: >
    certbot certonly --webroot -w {{ certbot_webroot }} -d {{ domain }}
    --non-interactive --agree-tos
    {{ ('--email ' + letsencrypt_email) if letsencrypt_email else '--register-unsafely-without-email' }}
  args:
    creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  when: not tls_enabled

- name: Mark TLS as enabled after issuance
  ansible.builtin.set_fact:
    tls_enabled: true
  when: not cert_stat.stat.exists

- name: Deploy vhost (phase 2 — with TLS)
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/conf.d/{{ domain }}.conf"
    mode: "0644"
  notify:
    - validate nginx
    - reload nginx
  when: not cert_stat.stat.exists

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: Add nginx reload hook for certificate renewals
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    mode: "0755"
    content: |
      #!/bin/sh
      systemctl reload nginx

- name: Ensure certbot renewal timer is enabled
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
