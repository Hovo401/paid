---
- name: Ensure apt prerequisites are present
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add NodeSource signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_major }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js {{ node_major }}
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pm2 globally
  ansible.builtin.command: npm install -g pm2
  args:
    creates: /usr/bin/pm2

- name: Check whether the pm2 systemd unit already exists
  ansible.builtin.stat:
    path: "/etc/systemd/system/pm2-{{ pm2_user }}.service"
  register: pm2_unit

- name: Configure pm2 systemd startup
  ansible.builtin.shell: >
    set -o pipefail &&
    pm2 startup systemd -u {{ pm2_user }} --hp /home/{{ pm2_user }}
    | grep -E '^sudo' | sh
  args:
    executable: /bin/bash
  when: not pm2_unit.stat.exists
