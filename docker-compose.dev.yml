services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: paidemail-backend
    env_file:
      - ./backend/.env.example
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: development
    ports:
      - "8000:8000"
    working_dir: /app
    command: ["pnpm", "run", "start:prod"]
    restart: unless-stopped

    develop:
      watch:
        - path: ./backend/package.json
          target: /app/package.json
          action: rebuild

        - path: ./backend
          target: /app
          action: sync
          ignore:
            - node_modules/
            - dist/
            - .git/

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paidemail-frontend
    env_file:
      - ./frontend/.env.example
      - path: ./frontend/.env
        required: false
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    working_dir: /app
    command: ["pnpm", "dev", "--host"]
    depends_on:
      - backend
    restart: unless-stopped

    develop:
      watch:
        - path: ./frontend/package.json
          target: /app/package.json
          action: rebuild

        - path: ./frontend
          target: /app
          action: sync
          ignore:
            - node_modules/
            - dist/
            - .git/
