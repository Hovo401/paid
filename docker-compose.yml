services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: paidemail-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: file:./dev.db
    ports:
      - "8000:8000"
    working_dir: /app
    command: ["pnpm", "run", "start:prod"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paidemail-frontend
    environment:
      NODE_ENV: development
      VITE_API_URL: "http://localhost:8000"
    ports:
      - "5173:5173"
    working_dir: /app
    command: ["pnpm", "dev", "--host"]
    depends_on:
      - backend
    restart: unless-stopped
