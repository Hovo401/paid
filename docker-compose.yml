services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: paidemail-backend
    env_file:
      - ./backend/.env.example
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: development
    ports:
      - "8000:8000"
    working_dir: /app
    command: ["pnpm", "run", "start:prod"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paidemail-frontend
    env_file:
      - ./frontend/.env.example
      - path: ./frontend/.env
        required: false
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    working_dir: /app
    command: ["pnpm", "dev", "--host"]
    depends_on:
      - backend
    restart: unless-stopped
